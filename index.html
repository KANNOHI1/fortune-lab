<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="dark">
  <title>ふたりの鑑定書</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #0a0e27;
      --bg1: #050810;
      --card: rgba(19, 26, 53, 0.86);
      --card-strong: rgba(24, 32, 67, 0.94);
      --line: rgba(224, 184, 76, 0.34);
      --line-soft: rgba(224, 184, 76, 0.2);
      --text: #eae6dc;
      --muted: #bcb6aa;
      --gold: #e0b84c;
      --gold-2: #f0d375;
      --naomi: #e8a0a8;
      --hk: #7fa8d9;
      --hard: #c25450;
      --white: #fff8ec;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --safe: min(1180px, calc(100% - 32px));
    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg1);
      color: var(--text);
      font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Sans", sans-serif;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(224, 184, 76, 0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 12%, rgba(255, 255, 255, 0.38) 0 1px, transparent 2px),
        radial-gradient(circle at 46% 62%, rgba(255, 255, 255, 0.24) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 78%, rgba(224, 184, 76, 0.18) 0 1px, transparent 2px),
        linear-gradient(145deg, var(--bg0), var(--bg1));
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 24%, rgba(224, 184, 76, 0.17), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(127, 168, 217, 0.14), transparent 28%),
        radial-gradient(circle at 58% 82%, rgba(232, 160, 168, 0.12), transparent 30%);
      animation: skyDrift 18s ease-in-out infinite alternate;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }
    svg { display: block; max-width: 100%; height: auto; }

    .shell {
      width: var(--safe);
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero {
      min-height: 78vh;
      display: grid;
      align-content: center;
      gap: 24px;
      padding: 38px 0 22px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--gold-2);
      font-family: "Cormorant", "Shippori Mincho", serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 14px;
    }

    .seal {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(224, 184, 76, 0.56);
      border-radius: 50%;
      color: var(--gold);
      box-shadow: inset 0 0 22px rgba(224, 184, 76, 0.12), 0 0 22px rgba(224, 184, 76, 0.14);
      font-family: "Shippori Mincho", serif;
      font-size: 12px;
      line-height: 1.15;
      text-align: center;
    }

    h1 {
      margin: 0;
      max-width: 980px;
      color: #f3ead8;
      font-family: "Shippori Mincho", "Yu Mincho", serif;
      font-size: clamp(42px, 8vw, 92px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 0 20px rgba(224, 184, 76, 0.22);
      text-wrap: balance;
    }

    .lead {
      max-width: 790px;
      margin: 0;
      color: #d9d3c6;
      font-size: clamp(16px, 2vw, 21px);
      line-height: 1.85;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
      gap: 22px;
      align-items: end;
    }

    .hero-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(19, 26, 53, 0.72);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .hero-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 6px 0 28px;
      padding: 10px 0;
      background: linear-gradient(180deg, rgba(5, 8, 16, 0.94), rgba(5, 8, 16, 0.72));
      backdrop-filter: blur(14px);
    }

    .tabs {
      width: var(--safe);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tab {
      min-height: 44px;
      border: 1px solid rgba(224, 184, 76, 0.44);
      border-radius: 999px;
      background: rgba(19, 26, 53, 0.74);
      color: var(--gold);
      font-weight: 700;
      transition: background-color 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .tab:hover,
    .tab:focus-visible {
      outline: none;
      color: var(--white);
      box-shadow: 0 0 0 3px rgba(224, 184, 76, 0.18);
    }

    .tab[aria-selected="true"] {
      background: rgba(224, 184, 76, 0.18);
      color: #fff3c6;
      box-shadow: inset 0 0 24px rgba(224, 184, 76, 0.12);
    }

    .panel {
      display: grid;
      gap: 22px;
      padding-bottom: 42px;
    }

    .panel[hidden] { display: none; }

    .section {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: clip;
      min-width: 0;
    }

    .section-pad { padding: clamp(18px, 3vw, 28px); }

    .section-title {
      margin: 0;
      color: var(--gold-2);
      font-family: "Shippori Mincho", "Yu Mincho", serif;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.28;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .section-copy,
    .copy {
      color: #ddd6c8;
      font-size: 15px;
      line-height: 1.9;
    }

    .section-copy { margin: 14px 0 0; }
    .copy { margin: 10px 0 0; }

    .one-liner {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      margin-top: 16px;
      padding: 4px 12px;
      border: 1px solid rgba(232, 160, 168, 0.54);
      border-radius: 999px;
      background: rgba(232, 160, 168, 0.1);
      color: #ffd4d8;
      font-weight: 700;
      font-size: 13px;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(320px, 0.98fr) minmax(0, 1.02fr);
      gap: 22px;
      align-items: start;
    }

    .chart-panel {
      position: relative;
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(8, 12, 31, 0.56);
    }

    .chart-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
      color: var(--gold-2);
      font-size: 13px;
      font-weight: 700;
    }

    .horo {
      width: min(100%, 540px);
      margin: 0 auto;
      aspect-ratio: 1;
    }

    .ring, .house, .zodiac-line, .aspect-line, .radar-axis, .radar-frame, .radar-shape {
      vector-effect: non-scaling-stroke;
    }

    .ring {
      fill: none;
      stroke: rgba(224, 184, 76, 0.42);
      stroke-width: 1.1;
    }

    .zodiac-line,
    .house {
      stroke: rgba(224, 184, 76, 0.28);
      stroke-width: 1;
    }

    .house {
      stroke-dasharray: 3 5;
      opacity: 0.8;
    }

    .sign-label {
      fill: rgba(234, 230, 220, 0.86);
      font-family: "Cormorant", "Noto Sans JP", serif;
      font-size: 19px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .planet {
      paint-order: stroke;
      stroke: rgba(5, 8, 16, 0.9);
      stroke-width: 4px;
      font-family: "Cormorant", "Noto Sans JP", serif;
      font-size: 15px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
      cursor: help;
    }

    .planet.naomi { fill: var(--naomi); }
    .planet.hk { fill: var(--hk); }
    .planet.marker { fill: var(--gold-2); font-size: 12px; }

    .aspect-line {
      stroke-width: 1.15;
      opacity: 0.68;
      cursor: pointer;
      pointer-events: stroke;
      transition: opacity 180ms ease, stroke-width 180ms ease;
    }

    .aspect-line:hover,
    .aspect-line:focus {
      opacity: 1;
      stroke-width: 2.4;
      outline: none;
    }

    .aspect-line.soft { stroke: rgba(224, 184, 76, 0.72); }
    .aspect-line.hard { stroke: rgba(194, 84, 80, 0.78); }
    .aspect-line.conjunction { stroke: rgba(255, 248, 236, 0.82); }
    .aspect-line.minor { stroke: rgba(188, 182, 170, 0.44); stroke-dasharray: 4 5; }
    .aspect-line.featured { stroke-width: 2.05; opacity: 0.94; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend span::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .legend .naomi { color: var(--naomi); }
    .legend .hk { color: var(--hk); }
    .legend .soft { color: var(--gold); }
    .legend .hard { color: var(--hard); }

    .tool-tip {
      position: fixed;
      z-index: 50;
      max-width: min(340px, calc(100vw - 28px));
      padding: 12px 14px;
      border: 1px solid rgba(224, 184, 76, 0.56);
      border-radius: 12px;
      background: rgba(5, 8, 16, 0.96);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.42);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .tool-tip.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tool-tip strong {
      display: block;
      color: var(--gold-2);
      margin-bottom: 4px;
      padding-right: 30px;
    }

    .tip-close,
    .sheet-close {
      position: absolute;
      top: 8px;
      right: 8px;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(224, 184, 76, 0.36);
      border-radius: 999px;
      background: rgba(5, 8, 16, 0.82);
      color: var(--gold-2);
      font-size: 18px;
      line-height: 1;
    }

    .stack {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .subgrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-card {
      min-width: 0;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(10, 14, 39, 0.5);
      padding: 16px;
    }

    .mini-title {
      margin: 0;
      color: var(--gold-2);
      font-family: "Shippori Mincho", serif;
      font-size: 18px;
      line-height: 1.35;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .bars {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 48px;
      align-items: center;
      gap: 10px;
      color: #dcd6cb;
      font-size: 13px;
    }

    .bar-track {
      height: 10px;
      border: 1px solid rgba(224, 184, 76, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(232, 160, 168, 0.88), rgba(224, 184, 76, 0.9));
    }

    .trait-board {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .trait-row {
      display: grid;
      grid-template-columns: minmax(88px, 0.34fr) minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(224, 184, 76, 0.18);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .trait-name {
      display: grid;
      gap: 2px;
      min-width: 0;
      font-weight: 900;
      color: var(--white);
    }

    .trait-keyword {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
    }

    .trait-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .trait-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      min-height: 34px;
      padding: 3px 8px;
      border: 1px solid currentColor;
      border-radius: 999px;
      background: rgba(5, 8, 16, 0.52);
      color: var(--gold-2);
      font-family: "Cormorant", "Noto Sans JP", serif;
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
    }

    .trait-chip.asc-chip {
      font-family: "Noto Sans JP", sans-serif;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .trait-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      min-height: 30px;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(224, 184, 76, 0.13);
      color: var(--gold-2);
      font-weight: 900;
    }

    .trait-fire { border-color: rgba(209, 132, 85, 0.48); }
    .trait-fire .trait-chip { color: #d18455; }
    .trait-earth { border-color: rgba(139, 154, 100, 0.5); }
    .trait-earth .trait-chip { color: #8b9a64; }
    .trait-air { border-color: rgba(104, 185, 197, 0.5); }
    .trait-air .trait-chip { color: #68b9c5; }
    .trait-water { border-color: rgba(105, 144, 198, 0.52); }
    .trait-water .trait-chip { color: #6990c6; }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full { grid-column: 1 / -1; }

    .table-wrap {
      overflow-x: auto;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
      font-size: 14px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid rgba(224, 184, 76, 0.18);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    th {
      color: var(--gold-2);
      background: rgba(224, 184, 76, 0.06);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: 0; }

    .summary-cards {
      display: none;
    }

    .summary-card {
      border: 1px solid rgba(224, 184, 76, 0.24);
      border-radius: 12px;
      background: rgba(10, 14, 39, 0.55);
      padding: 14px;
    }

    .summary-card + .summary-card {
      margin-top: 12px;
    }

    .summary-card h3 {
      margin: 0 0 10px;
      color: var(--gold-2);
      font-family: "Shippori Mincho", serif;
      font-size: 18px;
      line-height: 1.35;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid rgba(224, 184, 76, 0.16);
    }

    .summary-label {
      font-weight: 900;
      font-size: 13px;
      white-space: nowrap;
    }

    .summary-label.naomi { color: var(--naomi); }
    .summary-label.hk { color: var(--hk); }
    .summary-label.compat { color: var(--gold-2); }

    .summary-text {
      min-width: 0;
      color: #ddd6c8;
      font-size: 14px;
      line-height: 1.75;
      overflow-wrap: anywhere;
    }

    .day-cell {
      background: linear-gradient(90deg, rgba(224, 184, 76, 0.14), rgba(232, 160, 168, 0.08));
      color: var(--white);
      font-weight: 700;
    }

    .radar {
      width: min(100%, 330px);
      margin: 0 auto;
      aspect-ratio: 1;
    }

    .radar-axis,
    .radar-frame {
      fill: none;
      stroke: rgba(224, 184, 76, 0.32);
      stroke-width: 1;
    }

    .radar-shape {
      fill: rgba(224, 184, 76, 0.13);
      stroke: var(--gold);
      stroke-width: 2;
    }

    .radar-shape.naomi { fill: rgba(232, 160, 168, 0.2); stroke: var(--naomi); }
    .radar-shape.hk { fill: rgba(127, 168, 217, 0.18); stroke: var(--hk); stroke-dasharray: 6 4; }
    .radar-label {
      fill: var(--text);
      font-size: 12px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 4px 2px 2px;
    }

    .period {
      position: relative;
      min-width: 0;
      border: 1px solid rgba(224, 184, 76, 0.22);
      border-radius: 12px;
      background: rgba(10, 14, 39, 0.55);
      padding: 12px;
    }

    .period.current {
      border-color: rgba(224, 184, 76, 0.86);
      box-shadow: inset 0 0 22px rgba(224, 184, 76, 0.12), 0 0 18px rgba(224, 184, 76, 0.18);
    }

    .now-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      margin-bottom: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--gold);
      color: #111527;
      font-size: 11px;
      font-weight: 900;
    }

    .period strong {
      display: block;
      color: var(--gold-2);
      font-size: 17px;
      margin-bottom: 4px;
    }

    .fortune-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin-left: 6px;
      padding: 2px 9px;
      border-radius: 999px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: 12px;
      font-weight: 900;
      vertical-align: middle;
    }

    .fortune-daikichi {
      background: var(--gold);
      color: #111527;
    }

    .fortune-kichi {
      border: 1px solid rgba(224, 184, 76, 0.78);
      color: var(--gold-2);
      background: rgba(224, 184, 76, 0.08);
    }

    .fortune-hankichi {
      border: 1px solid rgba(210, 215, 220, 0.72);
      color: #eef2f5;
      background: rgba(210, 215, 220, 0.08);
    }

    .fortune-kyo {
      border: 1px solid rgba(194, 84, 80, 0.72);
      color: #ffb8b4;
      background: rgba(194, 84, 80, 0.09);
    }

    .fortune-daikyo {
      border: 1px solid rgba(194, 84, 80, 0.82);
      background: rgba(194, 84, 80, 0.72);
      color: #fff8ec;
    }

    .seimei-summary {
      border-color: rgba(224, 184, 76, 0.62);
      background:
        linear-gradient(135deg, rgba(224, 184, 76, 0.16), rgba(232, 160, 168, 0.08)),
        rgba(10, 14, 39, 0.72);
      box-shadow: inset 0 0 28px rgba(224, 184, 76, 0.08);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      min-height: 44px;
      padding: 7px 12px;
      border: 1px solid rgba(224, 184, 76, 0.4);
      border-radius: 999px;
      background: rgba(19, 26, 53, 0.62);
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
    }

    .chip[aria-pressed="true"] {
      background: rgba(224, 184, 76, 0.18);
      color: var(--white);
    }

    details {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(10, 14, 39, 0.45);
      padding: 14px 16px;
    }

    summary {
      min-height: 44px;
      display: flex;
      align-items: center;
      color: var(--gold-2);
      font-weight: 700;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 12px 0 0;
      color: #d8d2c7;
      font-size: 12px;
      line-height: 1.55;
    }

    .reveal {
      display: grid;
      gap: 14px;
    }

    .primary-btn {
      min-height: 48px;
      width: fit-content;
      max-width: 100%;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: var(--gold);
      color: #111527;
      font-weight: 800;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      outline: none;
      background: #f0ce68;
      box-shadow: 0 0 26px rgba(224, 184, 76, 0.34);
      transform: translateY(-1px);
    }

    .chapter-jump {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chapter-jump a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 6px 13px;
      border: 1px solid rgba(224, 184, 76, 0.38);
      border-radius: 999px;
      background: rgba(19, 26, 53, 0.7);
      color: var(--gold-2);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .chapter-banner {
      display: grid;
      gap: 6px;
      border: 1px solid rgba(224, 184, 76, 0.44);
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(224, 184, 76, 0.14), rgba(127, 168, 217, 0.08)),
        rgba(19, 26, 53, 0.78);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .chapter-kicker {
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .chapter-banner h2 {
      margin: 0;
      color: var(--white);
      font-family: "Shippori Mincho", serif;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.25;
    }

    .chapter-banner p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .guide {
      margin: -8px 0 0;
    }

    .guide ol {
      margin: 8px 0 0;
      padding-left: 1.4em;
      color: #ddd6c8;
      line-height: 1.8;
    }

    .term {
      border-bottom: 1px dotted rgba(224, 184, 76, 0.82);
      color: #fff0bd;
      cursor: help;
    }

    .term:focus {
      outline: 2px solid rgba(224, 184, 76, 0.45);
      outline-offset: 2px;
      border-radius: 3px;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      background: rgba(0, 0, 0, 0.34);
    }

    .sheet-backdrop.is-open {
      display: block;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 61;
      max-height: 40vh;
      overflow: auto;
      border-top: 1px solid rgba(224, 184, 76, 0.48);
      background: rgba(5, 8, 16, 0.98);
      box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.42);
      padding: 20px max(18px, calc((100% - 760px) / 2)) 24px;
      transform: translateY(105%);
      transition: transform 220ms ease;
    }

    .sheet.is-open {
      transform: translateY(0);
    }

    .sheet h2 {
      margin: 0 42px 8px 0;
      color: var(--gold-2);
      font-family: "Shippori Mincho", serif;
      font-size: 22px;
    }

    .sheet p {
      margin: 0;
      color: #ddd6c8;
      line-height: 1.8;
    }

    .aspect-player {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .paper-nav {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .paper-nav[hidden] {
      display: none;
    }

    .paper-count {
      min-width: 64px;
      color: var(--gold-2);
      font-weight: 800;
      text-align: center;
    }

    .paper-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .paper-card {
      border: 1px solid rgba(224, 184, 76, 0.24);
      border-radius: 12px;
      background: rgba(10, 14, 39, 0.55);
      padding: 14px;
    }

    .paper-card h3 {
      margin: 0;
      color: var(--gold-2);
      font-family: "Shippori Mincho", serif;
      font-size: 18px;
      line-height: 1.35;
    }

    .paper-card p {
      margin: 8px 0 0;
      color: #ddd6c8;
      font-size: 14px;
      line-height: 1.8;
    }

    .paper-mode:not(.show-all) .aspect-line {
      opacity: 0;
      pointer-events: none;
    }

    .paper-mode:not(.show-all) .aspect-line.story-active {
      opacity: 1;
      pointer-events: stroke;
      stroke-width: 3.2;
      filter: drop-shadow(0 0 8px rgba(224, 184, 76, 0.65));
      stroke-dasharray: 1;
      stroke-dashoffset: 0;
      transition: opacity 300ms ease, stroke-width 300ms ease, filter 300ms ease;
    }

    .planet.glow {
      filter: drop-shadow(0 0 8px currentColor);
      font-size: 18px;
    }

    .reveal-box {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 260ms ease, opacity 220ms ease;
    }

    .reveal-box.is-open {
      max-height: 1600px;
      opacity: 1;
    }

    .footer {
      width: var(--safe);
      margin: 0 auto;
      padding: 24px 0 42px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
      border-top: 1px solid rgba(224, 184, 76, 0.2);
    }

    .error {
      width: var(--safe);
      margin: 32px auto;
      border: 1px solid var(--hard);
      border-radius: 12px;
      background: rgba(194, 84, 80, 0.12);
      padding: 18px;
      color: var(--white);
    }

    @keyframes skyDrift {
      from { transform: translate3d(-1%, -1%, 0) scale(1); }
      to { transform: translate3d(1.2%, 1.4%, 0) scale(1.04); }
    }

    @media (max-width: 860px) {
      :root { --safe: min(100% - 24px, 680px); }
      .hero { min-height: auto; padding-top: 34px; }
      .hero-grid,
      .two-col,
      .subgrid,
      .cards { grid-template-columns: 1fr; }
      .tabs { gap: 6px; }
      .tab { padding-inline: 6px; font-size: 13px; }
      .full { grid-column: auto; }
      table { min-width: 460px; }
      .timeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .summary-table-wrap {
        display: none;
      }

      .summary-cards {
        display: block;
      }
    }

    @media (max-width: 420px) {
      :root { --safe: calc(100% - 20px); }
      .shell { padding-top: 18px; }
      .topline { font-size: 12px; }
      .seal { width: 48px; height: 48px; }
      .tab { font-size: 12px; }
      .section-pad { padding: 16px; }
      .bar-row { grid-template-columns: 70px minmax(0, 1fr) 42px; }
      table { min-width: 100%; table-layout: fixed; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

    const tt = parts.types?.[aspect.type]?.text || aspect.type;
    return {
      title: aspectTitleJa(aspect),
      text: `${pa} / ${pb} / ${tt}`,
      constructive_note: ""
    };
  }

  function escapeRegExp(value) {
    return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function cssSafe(value) {
    if (window.CSS?.escape) return CSS.escape(value || "");
    return String(value || "").replace(/["\\]/g, "\\$&");
  }

  function glossaryTerms() {
    return Object.keys(INTERP.glossary || {}).sort((a, b) => b.length - a.length);
  }

  function findTermIndex(source, term) {
    if (term === "ASC" || term === "MC") {
      const re = new RegExp(`(^|[^A-Za-z])(${escapeRegExp(term)})(?![A-Za-z])`);
      const m = re.exec(source);
      return m ? m.index + m[1].length : -1;
    }
    return source.indexOf(term);
  }

  function wrapTerms(raw) {
    const terms = glossaryTerms();
    let segments = [{ text: displayText(raw), term: null }];
    terms.forEach((term) => {
      let wrapped = false;
      segments = segments.flatMap((seg) => {
        if (wrapped || seg.term || !seg.text) return [seg];
        const idx = findTermIndex(seg.text, term);
        if (idx < 0) return [seg];
        wrapped = true;
        const before = seg.text.slice(0, idx);
        const hit = seg.text.slice(idx, idx + term.length);
        const after = seg.text.slice(idx + term.length);
        return [
          before ? { text: before, term: null } : null,
          { text: hit, term },
          after ? { text: after, term: null } : null
        ].filter(Boolean);
      });
    });
    return segments.map((seg) => seg.term
      ? `<span class="term" tabindex="0" data-term="${esc(seg.term)}">${esc(seg.text)}</span>`
      : esc(seg.text)
    ).join("");
  }

  function applyGlossary(root = document) {
    root.querySelectorAll(".copy, .section-copy, .lead, .meta, .one-liner, .hero-card p, .footer p, .paper-card p, .guide li").forEach((el) => {
      if (el.closest("svg, button") || el.querySelector(".term")) return;
      el.innerHTML = wrapTerms(el.textContent);
    });
  }

  function showGlossary(term) {
    const body = INTERP.glossary?.[term];
    if (!body) return;
    hideTip();
    sheetTitle.textContent = term;
    sheetBody.textContent = body;
    sheetBackdrop.classList.add("is-open");
    sheetBackdrop.setAttribute("aria-hidden", "false");
    sheet.classList.add("is-open");
    sheet.setAttribute("aria-hidden", "false");
  }

  function hideGlossary() {
    sheetBackdrop.classList.remove("is-open");
    sheetBackdrop.setAttribute("aria-hidden", "true");
    sheet.classList.remove("is-open");
    sheet.setAttribute("aria-hidden", "true");
  }

  function bindGlobalClosers() {
    document.addEventListener("click", (event) => {
      const term = event.target.closest(".term");
      if (term) {
        event.preventDefault();
        event.stopPropagation();
        showGlossary(term.dataset.term);
        return;
      }
      if (event.target.closest(".tool-tip")) return;
      if (!event.target.closest("[data-tip-title]")) hideTip();
      if (sheet.classList.contains("is-open") && !event.target.closest(".sheet")) hideGlossary();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        hideTip();
        hideGlossary();
      }
      if ((event.key === "Enter" || event.key === " ") && event.target.classList.contains("term")) {
        event.preventDefault();
        showGlossary(event.target.dataset.term);
      }
    });
    tip.addEventListener("click", (event) => {
      if (event.target.closest(".tip-close")) hideTip();
    });
    sheet.querySelector(".sheet-close").addEventListener("click", hideGlossary);
    sheetBackdrop.addEventListener("click", hideGlossary);
  }

    hideGlossary();
    tip.innerHTML = `<button class="tip-close" type="button" aria-label="ポップアップを閉じる">×</button><strong>${esc(title)}</strong>${esc(body)}`;
    const pad = 14;
    const rectWidth = Math.min(340, window.innerWidth - pad * 2);
    const left = Math.max(pad, Math.min(x + 14, window.innerWidth - rectWidth - pad));
    const top = Math.max(pad, Math.min(y + 14, window.innerHeight - 180));
    tip.style.left = `${left}px`;
    tip.style.top = `${top}px`;
    tip.classList.add("is-visible");
  }

    tip.classList.remove("is-visible");

  function bindTip(el, title, body) {
    el.addEventListener("pointerenter", (event) => showTip(title, body, event.clientX, event.clientY));
    el.addEventListener("pointermove", (event) => showTip(title, body, event.clientX, event.clientY));
    el.addEventListener("pointerleave", hideTip);
    el.addEventListener("focus", () => {
      const r = el.getBoundingClientRect();
      showTip(title, body, r.left + r.width / 2, r.top + r.height / 2);
    });
    el.addEventListener("blur", hideTip);
    el.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      showTip(title, body, event.clientX, event.clientY);
    });
  }

  function classifyTraits(calc) {
    const elementBySign = {
      Ari: "fire", Leo: "fire", Sag: "fire",
      Tau: "earth", Vir: "earth", Cap: "earth",
      Gem: "air", Lib: "air", Aqu: "air",
      Can: "water", Sco: "water", Pis: "water"
    };
    const qualityBySign = {
      Ari: "cardinal", Can: "cardinal", Lib: "cardinal", Cap: "cardinal",
      Tau: "fixed", Leo: "fixed", Sco: "fixed", Aqu: "fixed",
      Gem: "mutable", Vir: "mutable", Sag: "mutable", Pis: "mutable"
    };
    const points = objectEntries(calc.planets).map(([name, p]) => ({ name, ...p }));
    points.push({ name: "ASC", ...calc.asc });
    const result = {
      elements: { fire: [], earth: [], air: [], water: [] },
      qualities: { cardinal: [], fixed: [], mutable: [] }
    };
    points.forEach((point) => {
      const element = elementBySign[point.sign_en];
      const quality = qualityBySign[point.sign_en];
      if (!element || !quality) fail(`気質分布: 未対応サイン ${point.name}/${point.sign_en}`);
      result.elements[element].push(point);
      result.qualities[quality].push(point);
    });
    objectEntries(calc.distribution?.elements).forEach(([key, value]) => {
      if (result.elements[key].length !== Number(value)) fail(`気質分布(elements.${key}) が CALC と一致しません。`);
    });
    objectEntries(calc.distribution?.qualities).forEach(([key, value]) => {
      if (result.qualities[key].length !== Number(value)) fail(`気質分布(qualities.${key}) が CALC と一致しません。`);
    });
    if (points.length !== 11) fail("気質分布: 10天体+ASC の11点になっていません。");
    return result;
  }

  function radarSvg(counts, colorClass = "") {
    const entries = WUXING.map((label) => [label, Number(counts?.[label] || 0)]);
    const max = Math.max(1, ...entries.map(([, v]) => v));
    const cx = 150, cy = 150, r = 100;
    const pts = entries.map(([, value], i) => {
      const a = (-90 + i * 72) * Math.PI / 180;
      const rr = r * value / max;
      return `${cx + rr * Math.cos(a)},${cy + rr * Math.sin(a)}`;
    }).join(" ");
    const frame = [1, 0.66, 0.33].map((scale) => {
      const p = entries.map((_, i) => {
        const a = (-90 + i * 72) * Math.PI / 180;
        return `${cx + r * scale * Math.cos(a)},${cy + r * scale * Math.sin(a)}`;
      }).join(" ");
      return `<polygon class="radar-frame" points="${p}"></polygon>`;
    }).join("");
    const axes = entries.map(([label], i) => {
      const a = (-90 + i * 72) * Math.PI / 180;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      const lx = cx + (r + 20) * Math.cos(a), ly = cy + (r + 20) * Math.sin(a);
      return `<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"></line><text class="radar-label" x="${lx}" y="${ly}">${esc(label)}</text>`;
    }).join("");
    return `<svg class="radar" viewBox="0 0 300 300" role="img" aria-label="五行レーダー">${frame}${axes}<polygon class="radar-shape ${colorClass}" points="${pts}"></polygon></svg>`;
  }

  function renderNatalChart(targetId, key, calc, featuredList) {
    const target = document.getElementById(targetId);
    const ascLon = calc.asc?.lon || 0;
    const planetItems = objectEntries(calc.planets).map(([name, p]) => ({ name, lon: p.lon, sign: p.sign_ja, house: p.house, retro: p.retro }));
    planetItems.push({ name: "ASC", lon: calc.asc?.lon, sign: calc.asc?.sign_ja, house: "", marker: true });
    planetItems.push({ name: "MC", lon: calc.mc?.lon, sign: calc.mc?.sign_ja, house: "", marker: true });
    const byName = Object.fromEntries(planetItems.map((p) => [p.name, p]));
    const signs = SIGN_GLYPHS.map((glyph, i) => {
      const p = xy(i * 30 + 15, 228, ascLon);
      const line = xy(i * 30, 220, ascLon);
      const inner = xy(i * 30, 172, ascLon);
      return `<line class="zodiac-line" x1="${line.x}" y1="${line.y}" x2="${inner.x}" y2="${inner.y}"></line><text class="sign-label" x="${p.x}" y="${p.y}">${glyph}</text>`;
    }).join("");
    const houses = (calc.house_cusps || []).map((lon) => {
      const o = xy(lon, 210, ascLon);
      const i = xy(lon, 82, ascLon);
      return `<line class="house" x1="${o.x}" y1="${o.y}" x2="${i.x}" y2="${i.y}"></line>`;
    }).join("");
    const aspects = (calc.natal_aspects || []).map((aspect, idx) => {
      const a = byName[aspect.a], b = byName[aspect.b];
      if (!a || !b) return "";
      const pa = xy(a.lon, 124, ascLon), pb = xy(b.lon, 124, ascLon);
      const f = findFeatured(featuredList, aspect);
      const storyIndex = featuredList.findIndex((item) => sameAspect(aspect.a, aspect.b, aspect.type, item));
      const d = f || aspectFallback(aspect);
      return `<line tabindex="0" role="button" class="${lineClass(aspect.type, Boolean(f))}" data-story-index="${storyIndex}" data-point-a="${esc(aspect.a)}" data-point-b="${esc(aspect.b)}" data-tip-title="${esc(d.title)}" data-tip-body="${esc(d.text || d.constructive_note || "")}" x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}"></line>`;
    }).join("");
    const planets = planetItems.map((p, idx) => {

  function bindPaperPlayer(stage, featuredList) {
    if (!stage) return;
    let index = -1;
    const start = stage.querySelector("[data-paper-start]");
    const nav = stage.querySelector(".paper-nav");
    const count = stage.querySelector("[data-paper-count]");
    const card = stage.querySelector("[data-paper-card]");
    const allToggle = stage.querySelector("[data-paper-all]");
    const draw = (nextIndex) => {
      if (!featuredList.length) return;
      index = (nextIndex + featuredList.length) % featuredList.length;
      stage.classList.remove("show-all");
      allToggle.checked = false;
      nav.hidden = false;
      stage.querySelectorAll(".aspect-line").forEach((line) => line.classList.toggle("story-active", Number(line.dataset.storyIndex) === index));
      stage.querySelectorAll(".planet").forEach((planet) => planet.classList.remove("glow"));
      const active = stage.querySelector(`.aspect-line[data-story-index="${index}"]`);
      if (active) {
        [active.dataset.pointA, active.dataset.pointB].forEach((point) => {
          const exact = cssSafe(point || "");
          const normalized = cssSafe(normalizePoint(point));
          stage.querySelectorAll(`.planet[data-point-id="${exact}"], .planet[data-point-id="${normalized}"]`).forEach((planet) => planet.classList.add("glow"));
        });
      }
      const item = featuredList[index];
      count.textContent = `${index + 1} / ${featuredList.length}`;
      card.innerHTML = `<h3>${esc(item.title || "注目アスペクト")}</h3><p class="copy">${esc(item.text || "")}</p>${item.constructive_note ? `<p class="meta">${esc(item.constructive_note)}</p>` : ""}`;
      applyGlossary(card);
    };
    start.addEventListener("click", () => draw(index < 0 ? 0 : index));
    stage.querySelector("[data-paper-prev]").addEventListener("click", () => draw(index <= 0 ? featuredList.length - 1 : index - 1));
    stage.querySelector("[data-paper-next]").addEventListener("click", () => draw(index + 1));
    allToggle.addEventListener("change", () => {
      stage.classList.toggle("show-all", allToggle.checked);
      if (allToggle.checked) {
        nav.hidden = true;
        stage.querySelectorAll(".aspect-line").forEach((line) => {
          line.classList.remove("story-active");
          line.style.display = "";
        });
        stage.querySelectorAll(".planet").forEach((planet) => planet.classList.remove("glow"));
        card.innerHTML = `<h3>すべての線を表示中</h3><p>各線に触れると、その角度の読みが開きます。</p>`;
      } else if (index >= 0) {
        draw(index);
      } else {
        card.innerHTML = `<h3>星図だけを表示中</h3><p>開始ボタンで注目アスペクトを1本ずつ表示します。</p>`;
      }
      applyGlossary(card);
    });
  }

  function renderSynastry() {
    const target = document.getElementById("synastry-chart");
    const naomi = CALC.astro.naomi;
    const hk = CALC.astro.hk;
    const ascLon = naomi.asc?.lon || 0;
    const all = {
      Naomi: { ...naomi.planets, ASC: naomi.asc, MC: naomi.mc },
      HK: { ...hk.planets, ASC: hk.asc, MC: hk.mc }
    };
    const signs = SIGN_GLYPHS.map((glyph, i) => {
      const p = xy(i * 30 + 15, 228, ascLon);
      return `<text class="sign-label" x="${p.x}" y="${p.y}">${glyph}</text>`;
    }).join("");
    const planetTexts = ["Naomi", "HK"].map((prefix) => {
      const radius = prefix === "Naomi" ? 132 : 174;
      const cls = prefix === "Naomi" ? "naomi" : "hk";
      return objectEntries(all[prefix]).map(([name, p], idx) => {
        const pos = xy(p.lon, radius + (idx % 2) * 10, ascLon);
        const label = synastryPointLabel(`${prefix}.${name}`);
        const body = `${label} / ${signForLon(p.lon)}${p.house ? ` / ${p.house}ハウス` : ""}`;
        return `<text tabindex="0" class="planet ${cls} ${name === "ASC" || name === "MC" ? "marker" : ""}" data-point-id="${esc(prefix + "." + name)}" data-tip-title="${esc(label)}" data-tip-body="${esc(body)}" x="${pos.x}" y="${pos.y}">${esc(PLANET_GLYPHS[name] || name)}</text>`;
      }).join("");
    }).join("");
    const aspects = CALC.astro.synastry.aspects.map((aspect) => {
      const [paName, aName] = aspect.a.split(".");
      const [pbName, bName] = aspect.b.split(".");
      const a = all[paName]?.[aName], b = all[pbName]?.[bName];
      if (!a || !b) return "";
      const p1 = xy(a.lon, paName === "Naomi" ? 132 : 174, ascLon);
      const p2 = xy(b.lon, pbName === "Naomi" ? 132 : 174, ascLon);
      const f = findFeatured(INTERP.compat.astro.aspect_featured, aspect);
      const storyIndex = INTERP.compat.astro.aspect_featured.findIndex((item) => sameAspect(aspect.a, aspect.b, aspect.type, item));
      const d = f || aspectFallback(aspect);
      const filter = aspect.highlight || f ? "major" : (["Trine", "Sextile"].includes(aspect.type) ? "soft" : (["Square", "Opposition"].includes(aspect.type) ? "hard" : "all"));
      return `<line tabindex="0" role="button" class="${lineClass(aspect.type, Boolean(aspect.highlight || f))}" data-story-index="${storyIndex}" data-point-a="${esc(aspect.a)}" data-point-b="${esc(aspect.b)}" data-filter-kind="${filter}" data-type="${esc(aspect.type)}" data-tip-title="${esc(d.title)}" data-tip-body="${esc((d.text || "") + (d.constructive_note ? " / " + d.constructive_note : ""))}" x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}"></line>`;
    }).join("");
    target.innerHTML = `<div class="chart-stage paper-mode" data-paper-stage="synastry-chart"><svg class="horo" viewBox="0 0 500 500" role="img" aria-label="シナストリーホロスコープ。内側は奈緒美、外側は宏勇"><circle class="ring" cx="250" cy="250" r="232"></circle><circle class="ring" cx="250" cy="250" r="190"></circle><circle class="ring" cx="250" cy="250" r="152"></circle><circle class="ring" cx="250" cy="250" r="112"></circle><circle class="ring" cx="250" cy="250" r="70"></circle>${signs}${aspects}${planetTexts}</svg>${aspectPlayerHtml("synastry-chart", INTERP.compat.astro.aspect_featured)}</div>`;
    target.querySelectorAll("[data-tip-title]").forEach((el) => bindTip(el, el.dataset.tipTitle, el.dataset.tipBody));
    bindPaperPlayer(target.querySelector(".chart-stage"), INTERP.compat.astro.aspect_featured || []);
  }

      ["姓名判断", INTERP.person_naomi?.seimei?.intro, INTERP.person_hk?.seimei?.saikyo_note || CALC.seimei.hk_current?.soukaku?.meaning, INTERP.compat?.seimei?.married_sim_reveal?.after_title]
    ];
    const table = `<div class="table-wrap summary-table-wrap"><table><thead><tr><th>体系</th><th>奈緒美</th><th>宏勇</th><th>相性</th></tr></thead><tbody>${rows.map((r) => `<tr><th>${esc(r[0])}</th><td>${esc(cell(r[1]))}</td><td>${esc(cell(r[2]))}</td><td>${esc(cell(r[3]))}</td></tr>`).join("")}</tbody></table></div>`;
    const cards = `<div class="summary-cards">${rows.map((r) => `<article class="summary-card"><h3>${esc(r[0])}</h3><div class="summary-row"><span class="summary-label naomi">奈緒美</span><span class="summary-text">${esc(cell(r[1]))}</span></div><div class="summary-row"><span class="summary-label hk">宏勇</span><span class="summary-text">${esc(cell(r[2]))}</span></div><div class="summary-row"><span class="summary-label compat">相性</span><span class="summary-text">${esc(cell(r[3]))}</span></div></article>`).join("")}</div>`;
    return `${table}${cards}`;
  }

  function activateTab(key, updateHash = true) {
    const safeKey = TAB_ORDER.includes(key) ? key : "naomi";
    TAB_ORDER.forEach((id) => {
      const active = id === safeKey;
      document.getElementById(`tab-${id}`).setAttribute("aria-selected", String(active));
      document.getElementById(`panel-${id}`).hidden = !active;
    });
    if (updateHash && location.hash.replace("#", "") !== safeKey) history.replaceState(null, "", `#${safeKey}`);
  }

  function bindTabs() {
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => activateTab(tab.dataset.tab));
    });
    window.addEventListener("hashchange", () => activateTab(location.hash.replace("#", ""), false));
  }

  function init() {
    assertData();
    renderShell();
    renderPerson("naomi");
    renderPerson("hk");
    renderCompat();
    renderOverall();
    applyGlossary(app);
    bindGlobalClosers();
    bindTabs();
    activateTab(location.hash.replace("#", "") || "naomi", false);
  }

  try {
    init();
  } catch (error) {
    app.innerHTML = `<div class="error"><strong>仕様またはJSONの齟齬を検出しました。</strong><p>${esc(error.message)}</p></div>`;
    console.error(error);
  }
})();
  </script>
</body>
</html>
